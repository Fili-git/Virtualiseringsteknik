---
- name: Configure Certificates
  hosts: ca
  become: yes
  roles:
    - config

- name: Create certificate and CSR
  hosts: webserver
  become: yes
  roles:
    - csr
    
- name: Sign CSR request
  hosts: ca
  become: yes
  roles:
    - sign

- name: Install and configure nginx
  hosts: webserver
  become: yes
  roles:
    - nginx