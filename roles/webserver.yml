- name: Configure Webserver
  hosts: localhost
  become: yes
  tasks:
    - name: Ensure Nginx is installed
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure Nginx is running
      ansible.builtin.service:
        name: nginx
        state: started


    - name: Generera webbserverns privata nyckel 
      command: >
        openssl genrsa -out /opt/ca/webserver.key 4096
      args:
        creates: /opt/ca/webserver.key

    - name: Generera CSR för webbservern 
      command: >
        openssl req -new
        -key /opt/ca/webserver.key
        -out /opt/ca/webserver.csr
        -subj "/CN=webserver.lab.local/O=Lab/C=SE"
      args:
        creates: /opt/ca/webserver.csr


    - name: Skapa cert-mapp
      file:
        path: /etc/nginx/certs
        state: directory

    - name: Kopiera webbserverns certifikat och nyckel
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "{{ item.mode }}"
      loop:
        - { src: "files/webserver.crt", dest: "/etc/nginx/certs/webserver.crt", mode: "0644" }
        - { src: "files/webserver.key", dest: "/etc/nginx/certs/webserver.key", mode: "0600" }
    
