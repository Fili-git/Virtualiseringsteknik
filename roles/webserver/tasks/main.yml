
- name: Configure Webserver
  hosts: localhost
  become: yes
  tasks:
    - name: Install openssl
      ansible.builtin.apt:
        name: openssl
        state: present

    - name: Create webserver certificate directory
      file: 
        path: /opt/webservern
        state: directory
        mode: '0700'

    - name: Generate webserver private key
      command: openssl genrsa -out /opt/webserver/webserver.key 4096
      args:
        creates: /opt/webserver/webserver.key

    - name: Generate CSR for webserver
      command: >
        openssl req -new
        -key /opt/webserver/webserver.key
        -out /opt/webserver/webserver.csr
        -subj "/CN=webserver.lab.local/O=Lab/C=SE"
      args:
        creates: /opt/webserver/webserver.csr

    - name: Fetch CSR to controller
      fetch:
        src: /opt/webserver/webserver.csr
        dest: /tmp/webserver.csr
        flat: yes

    - name: Copy signed certificate back to webserver
      copy:
        src: /tmp/webserver.crt
        dest: /opt/webserver/webserver.crt

    - name: Ensure Nginx is installed
      ansible.builtin.apt:
        name: nginx
        state: present

    - name: Ensure Nginx is running
      ansible.builtin.service:
        name: nginx
        state: started

    - name: Skapa cert-mapp
      file:
        path: /etc/nginx/certs
        state: directory

    - name: Kopiera webbserverns certifikat och nyckel
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "{{ item.mode }}"
      loop:
        - { src: "files/webserver.crt", dest: "/etc/nginx/certs/webserver.crt", mode: "0644" }
        - { src: "files/webserver.key", dest: "/etc/nginx/certs/webserver.key", mode: "0600" }
    
    - name: Konfigurera Nginx med HTTPS
      copy:
        dest: /etc/nginx/sites-enabled/default
        content: |
            server {
              listen 443 ssl;
              server_name webserver.lab.local;

              ssl_certificate     /etc/nginx/certs/webserver.crt;
              ssl_certificate_key /etc/nginx/certs/webserver.key;

              location / {
                return 200 'Hello from webserver.lab.local over HTTPS!\n';
              add_header Content-Type text/plain;
              }
            }
