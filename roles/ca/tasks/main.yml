- name: Installera openssl
  hosts: localhost
  become: yes
  tasks:
    
    - name: install Open SSL 
      ansible.builtin.apt:
        name: openssl
        state: present

    - name: skapa CA-mapp
      file:
        path: /opt/ca
        state: directory
        mode: '0700'

    - name: generera CA-nyckel
      command: >
        openssl genrsa -out /opt/ca/ca.key 4096
      args:
        creates: /opt/ca/ca.key

    - name: Generera CA-certifikat (självsignerat, 10 år)
      command: >
        openssl req -new -x509 -days 3650
        -key /opt/ca/ca.key
        -out /opt/ca/ca.crt
        -subj "/CN=Lab Internal CA/O=Lab/C=SE"
      args:
        creates: /opt/ca/ca.crt

    - name: Fetch CA certificate to controller
      fetch:
        src: /otp/ca/ca.crt
        dest: /tmp/ca.crt
        flat: yes
    
    - name: Copy CSR from controller to CA
      copy:
        src: /temp/webserver.csr
        dest: /opt/ca/webserver.csr

    - name: Sign webserver certificate
      command: >
        openssl x509 -req
        -in /opt/ca/webserver.csr
        -CA /otp/ca/ca.crt
        -CAkey /otp/ca/ca.key
        -CAcreateserial
        -out /opt/ca/webserver.crt
        -days 365 -sha256
      args:
        creates: /opt/ca/webserver.crt

    - name: Fetch signed certificate to controller
      fetch: 
        src: /opt/ca/webserver.crt
        dest: /tmp/webserver.certificate
        flat: yes

    - name: Generera CSR för webbservern
      command: >
        openssl req -new
        -key /opt/ca/webserver.key
        -out /opt/ca/webserver.csr
        -subj "/CN=webserver.lab.local/O=Lab/C=SE"
      args:
        creates: /opt/ca/webserver.csr

