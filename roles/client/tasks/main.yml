- name: Kopiera CA-certifikat till klienten
  copy:
    src: files/ca.crt
    dest: /usr/local/share/ca-certificates/lab-ca.crt
    mode: '0644'

- name: Uppdatera trust store
  command: update-ca-certificates

- name: Lägg till webserver.lab.local i /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "10.0.0.2 webserver.lab.local"
